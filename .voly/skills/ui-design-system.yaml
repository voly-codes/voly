id: ui-design-system
name: ui-design-system
description: UI design system toolkit for Senior UI Designer including design token
  generation, component documentation, responsive design calculations, and developer
  handoff tools. Use when creating design systems, generating design tokens, maintaining
  visual consistency, or facilitating design-dev collaboration and developer handoff.
source: marketplace
status: active
version: 1.0.0
content: "# UI Design System\n\nGenerate design tokens, create color palettes, calculate\
  \ typography scales, build component systems, and prepare developer handoff documentation.\n\
  \n---\n\n## Table of Contents\n\n- [Trigger Terms](#trigger-terms)\n- [Workflows](#workflows)\n\
  \  - [Workflow 1: Generate Design Tokens](#workflow-1-generate-design-tokens)\n\
  \  - [Workflow 2: Create Component System](#workflow-2-create-component-system)\n\
  \  - [Workflow 3: Responsive Design](#workflow-3-responsive-design)\n  - [Workflow\
  \ 4: Developer Handoff](#workflow-4-developer-handoff)\n- [Tool Reference](#tool-reference)\n\
  - [Quick Reference Tables](#quick-reference-tables)\n- [Knowledge Base](#knowledge-base)\n\
  \n---\n\n## Trigger Terms\n\nUse this skill when you need to:\n\n- \"generate design\
  \ tokens\"\n- \"create color palette\"\n- \"build typography scale\"\n- \"calculate\
  \ spacing system\"\n- \"create design system\"\n- \"generate CSS variables\"\n-\
  \ \"export SCSS tokens\"\n- \"set up component architecture\"\n- \"document component\
  \ library\"\n- \"calculate responsive breakpoints\"\n- \"prepare developer handoff\"\
  \n- \"convert brand color to palette\"\n- \"check WCAG contrast\"\n- \"build 8pt\
  \ grid system\"\n\n---\n\n## Workflows\n\n### Workflow 1: Generate Design Tokens\n\
  \n**Situation:** You have a brand color and need a complete design token system.\n\
  \n**Steps:**\n\n1. **Identify brand color and style**\n   - Brand primary color\
  \ (hex format)\n   - Style preference: `modern` | `classic` | `playful`\n\n2. **Generate\
  \ tokens using script**\n   ```bash\n   python scripts/design_token_generator.py\
  \ \"#0066CC\" modern json\n   ```\n\n3. **Review generated categories**\n   - Colors:\
  \ primary, secondary, neutral, semantic, surface\n   - Typography: fontFamily, fontSize,\
  \ fontWeight, lineHeight\n   - Spacing: 8pt grid-based scale (0-64)\n   - Borders:\
  \ radius, width\n   - Shadows: none through 2xl\n   - Animation: duration, easing\n\
  \   - Breakpoints: xs through 2xl\n\n4. **Export in target format**\n   ```bash\n\
  \   # CSS custom properties\n   python scripts/design_token_generator.py \"#0066CC\"\
  \ modern css > design-tokens.css\n\n   # SCSS variables\n   python scripts/design_token_generator.py\
  \ \"#0066CC\" modern scss > _design-tokens.scss\n\n   # JSON for Figma/tooling\n\
  \   python scripts/design_token_generator.py \"#0066CC\" modern json > design-tokens.json\n\
  \   ```\n\n5. **Validate accessibility**\n   - Check color contrast meets WCAG AA\
  \ (4.5:1 normal, 3:1 large text)\n   - Verify semantic colors have contrast colors\
  \ defined\n\n---\n\n### Workflow 2: Create Component System\n\n**Situation:** You\
  \ need to structure a component library using design tokens.\n\n**Steps:**\n\n1.\
  \ **Define component hierarchy**\n   - Atoms: Button, Input, Icon, Label, Badge\n\
  \   - Molecules: FormField, SearchBar, Card, ListItem\n   - Organisms: Header, Footer,\
  \ DataTable, Modal\n   - Templates: DashboardLayout, AuthLayout\n\n2. **Map tokens\
  \ to components**\n\n   | Component | Tokens Used |\n   |-----------|-------------|\n\
  \   | Button | colors, sizing, borders, shadows, typography |\n   | Input | colors,\
  \ sizing, borders, spacing |\n   | Card | colors, borders, shadows, spacing |\n\
  \   | Modal | colors, shadows, spacing, z-index, animation |\n\n3. **Define variant\
  \ patterns**\n\n   Size variants:\n   ```\n   sm: height 32px, paddingX 12px, fontSize\
  \ 14px\n   md: height 40px, paddingX 16px, fontSize 16px\n   lg: height 48px, paddingX\
  \ 20px, fontSize 18px\n   ```\n\n   Color variants:\n   ```\n   primary: background\
  \ primary-500, text white\n   secondary: background neutral-100, text neutral-900\n\
  \   ghost: background transparent, text neutral-700\n   ```\n\n4. **Document component\
  \ API**\n   - Props interface with types\n   - Variant options\n   - State handling\
  \ (hover, active, focus, disabled)\n   - Accessibility requirements\n\n5. **Reference:**\
  \ See `references/component-architecture.md`\n\n---\n\n### Workflow 3: Responsive\
  \ Design\n\n**Situation:** You need breakpoints, fluid typography, or responsive\
  \ spacing.\n\n**Steps:**\n\n1. **Define breakpoints**\n\n   | Name | Width | Target\
  \ |\n   |------|-------|--------|\n   | xs | 0 | Small phones |\n   | sm | 480px\
  \ | Large phones |\n   | md | 640px | Tablets |\n   | lg | 768px | Small laptops\
  \ |\n   | xl | 1024px | Desktops |\n   | 2xl | 1280px | Large screens |\n\n2. **Calculate\
  \ fluid typography**\n\n   Formula: `clamp(min, preferred, max)`\n\n   ```css\n\
  \   /* 16px to 24px between 320px and 1200px viewport */\n   font-size: clamp(1rem,\
  \ 0.5rem + 2vw, 1.5rem);\n   ```\n\n   Pre-calculated scales:\n   ```css\n   --fluid-h1:\
  \ clamp(2rem, 1rem + 3.6vw, 4rem);\n   --fluid-h2: clamp(1.75rem, 1rem + 2.3vw,\
  \ 3rem);\n   --fluid-h3: clamp(1.5rem, 1rem + 1.4vw, 2.25rem);\n   --fluid-body:\
  \ clamp(1rem, 0.95rem + 0.2vw, 1.125rem);\n   ```\n\n3. **Set up responsive spacing**\n\
  \n   | Token | Mobile | Tablet | Desktop |\n   |-------|--------|--------|---------|\n\
  \   | --space-md | 12px | 16px | 16px |\n   | --space-lg | 16px | 24px | 32px |\n\
  \   | --space-xl | 24px | 32px | 48px |\n   | --space-section | 48px | 80px | 120px\
  \ |\n\n4. **Reference:** See `references/responsive-calculations.md`\n\n---\n\n\
  ### Workflow 4: Developer Handoff\n\n**Situation:** You need to hand off design\
  \ tokens to development team.\n\n**Steps:**\n\n1. **Export tokens in required formats**\n\
  \   ```bash\n   # For CSS projects\n   python scripts/design_token_generator.py\
  \ \"#0066CC\" modern css\n\n   # For SCSS projects\n   python scripts/design_token_generator.py\
  \ \"#0066CC\" modern scss\n\n   # For JavaScript/TypeScript\n   python scripts/design_token_generator.py\
  \ \"#0066CC\" modern json\n   ```\n\n2. **Prepare framework integration**\n\n  \
  \ **React + CSS Variables:**\n   ```tsx\n   import './design-tokens.css';\n\n  \
  \ <button className=\"btn btn-primary\">Click</button>\n   ```\n\n   **Tailwind\
  \ Config:**\n   ```javascript\n   const tokens = require('./design-tokens.json');\n\
  \n   module.exports = {\n     theme: {\n       colors: tokens.colors,\n       fontFamily:\
  \ tokens.typography.fontFamily\n     }\n   };\n   ```\n\n   **styled-components:**\n\
  \   ```typescript\n   import tokens from './design-tokens.json';\n\n   const Button\
  \ = styled.button`\n     background: ${tokens.colors.primary['500']};\n     padding:\
  \ ${tokens.spacing['2']} ${tokens.spacing['4']};\n   `;\n   ```\n\n3. **Sync with\
  \ Figma**\n   - Install Tokens Studio plugin\n   - Import design-tokens.json\n \
  \  - Tokens sync automatically with Figma styles\n\n4. **Handoff checklist**\n \
  \  - [ ] Token files added to project\n   - [ ] Build pipeline configured\n   -\
  \ [ ] Theme/CSS variables imported\n   - [ ] Component library aligned\n   - [ ]\
  \ Documentation generated\n\n5. **Reference:** See `references/developer-handoff.md`\n\
  \n---\n\n## Tool Reference\n\n### design_token_generator.py\n\nGenerates complete\
  \ design token system from brand color.\n\n| Argument | Values | Default | Description\
  \ |\n|----------|--------|---------|-------------|\n| brand_color | Hex color |\
  \ #0066CC | Primary brand color |\n| style | modern, classic, playful | modern |\
  \ Design style preset |\n| format | json, css, scss, summary | json | Output format\
  \ |\n\n**Examples:**\n\n```bash\n# Generate JSON tokens (default)\npython scripts/design_token_generator.py\
  \ \"#0066CC\"\n\n# Classic style with CSS output\npython scripts/design_token_generator.py\
  \ \"#8B4513\" classic css\n\n# Playful style summary view\npython scripts/design_token_generator.py\
  \ \"#FF6B6B\" playful summary\n```\n\n**Output Categories:**\n\n| Category | Description\
  \ | Key Values |\n|----------|-------------|------------|\n| colors | Color palettes\
  \ | primary, secondary, neutral, semantic, surface |\n| typography | Font system\
  \ | fontFamily, fontSize, fontWeight, lineHeight |\n| spacing | 8pt grid | 0-64\
  \ scale, semantic (xs-3xl) |\n| sizing | Component sizes | container, button, input,\
  \ icon |\n| borders | Border values | radius (per style), width |\n| shadows | Shadow\
  \ styles | none through 2xl, inner |\n| animation | Motion tokens | duration, easing,\
  \ keyframes |\n| breakpoints | Responsive | xs, sm, md, lg, xl, 2xl |\n| z-index\
  \ | Layer system | base through notification |\n\n---\n\n## Quick Reference Tables\n\
  \n### Color Scale Generation\n\n| Step | Brightness | Saturation | Use Case |\n\
  |------|------------|------------|----------|\n| 50 | 95% fixed | 30% | Subtle backgrounds\
  \ |\n| 100 | 95% fixed | 38% | Light backgrounds |\n| 200 | 95% fixed | 46% | Hover\
  \ states |\n| 300 | 95% fixed | 54% | Borders |\n| 400 | 95% fixed | 62% | Disabled\
  \ states |\n| 500 | Original | 70% | Base/default color |\n| 600 | Original × 0.8\
  \ | 78% | Hover (dark) |\n| 700 | Original × 0.6 | 86% | Active states |\n| 800\
  \ | Original × 0.4 | 94% | Text |\n| 900 | Original × 0.2 | 100% | Headings |\n\n\
  ### Typography Scale (1.25x Ratio)\n\n| Size | Value | Calculation |\n|------|-------|-------------|\n\
  | xs | 10px | 16 ÷ 1.25² |\n| sm | 13px | 16 ÷ 1.25¹ |\n| base | 16px | Base |\n\
  | lg | 20px | 16 × 1.25¹ |\n| xl | 25px | 16 × 1.25² |\n| 2xl | 31px | 16 × 1.25³\
  \ |\n| 3xl | 39px | 16 × 1.25⁴ |\n| 4xl | 49px | 16 × 1.25⁵ |\n| 5xl | 61px | 16\
  \ × 1.25⁶ |\n\n### WCAG Contrast Requirements\n\n| Level | Normal Text | Large Text\
  \ |\n|-------|-------------|------------|\n| AA | 4.5:1 | 3:1 |\n| AAA | 7:1 | 4.5:1\
  \ |\n\nLarge text: ≥18pt regular or ≥14pt bold\n\n### Style Presets\n\n| Aspect\
  \ | Modern | Classic | Playful |\n|--------|--------|---------|---------|\n| Font\
  \ Sans | Inter | Helvetica | Poppins |\n| Font Mono | Fira Code | Courier | Source\
  \ Code Pro |\n| Radius Default | 8px | 4px | 16px |\n| Shadows | Layered, subtle\
  \ | Single layer | Soft, pronounced |\n\n---\n\n## Knowledge Base\n\nDetailed reference\
  \ guides in `references/`:\n\n| File | Content |\n|------|---------|\n| `token-generation.md`\
  \ | Color algorithms, HSV space, WCAG contrast, type scales |\n| `component-architecture.md`\
  \ | Atomic design, naming conventions, props patterns |\n| `responsive-calculations.md`\
  \ | Breakpoints, fluid typography, grid systems |\n| `developer-handoff.md` | Export\
  \ formats, framework setup, Figma sync |\n\n---\n\n## Validation Checklist\n\n###\
  \ Token Generation\n- [ ] Brand color provided in hex format\n- [ ] Style matches\
  \ project requirements\n- [ ] All token categories generated\n- [ ] Semantic colors\
  \ include contrast values\n\n### Component System\n- [ ] All sizes implemented (sm,\
  \ md, lg)\n- [ ] All variants implemented (primary, secondary, ghost)\n- [ ] All\
  \ states working (hover, active, focus, disabled)\n- [ ] Uses only design tokens\
  \ (no hardcoded values)\n\n### Accessibility\n- [ ] Color contrast meets WCAG AA\n\
  - [ ] Focus indicators visible\n- [ ] Touch targets ≥ 44×44px\n- [ ] Semantic HTML\
  \ elements used\n\n### Developer Handoff\n- [ ] Tokens exported in required format\n\
  - [ ] Framework integration documented\n- [ ] Design tool synced\n- [ ] Component\
  \ documentation complete"
