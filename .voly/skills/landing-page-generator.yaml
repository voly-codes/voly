id: landing-page-generator
name: landing-page-generator
description: Generates high-converting landing pages as complete Next.js/React (TSX)
  components with Tailwind CSS. Creates hero sections, feature grids, pricing tables,
  FAQ accordions, testimonial blocks, and CTA sections using proven copy frameworks
  (PAS, AIDA, BAB). Outputs SEO meta tags, structured data, and performance-optimised
  code targeting Core Web Vitals (LCP < 1s, CLS < 0.1). Use when the user asks to
  create a landing page, marketing page, homepage, single-page site, lead capture
  page, campaign page, promo page, or conversion-optimised web page — or when they
  want to A/B test landing page variants or replace a static page with one designed
  to convert.
source: marketplace
status: active
version: 1.0.0
content: "# Landing Page Generator\n\nGenerate high-converting landing pages from\
  \ a product description. Output complete Next.js/React components with multiple\
  \ section variants, proven copy frameworks, SEO optimization, and performance-first\
  \ patterns. Not lorem ipsum — actual copy that converts.\n\n**Target:** LCP < 1s\
  \ · CLS < 0.1 · FID < 100ms  \n**Output:** TSX components + Tailwind styles + SEO\
  \ meta + copy variants\n\n---\n\n## Core Capabilities\n\n- 5 hero section variants\
  \ (centered, split, gradient, video-bg, minimal)\n- Feature sections (grid, alternating,\
  \ cards with icons)\n- Pricing tables (2–4 tiers with feature lists and toggle)\n\
  - FAQ accordion with schema markup\n- Testimonials (grid, carousel, single-quote)\n\
  - CTA sections (banner, full-page, inline)\n- Footer (simple, mega, minimal)\n-\
  \ 4 design styles with Tailwind class sets\n\n---\n\n## Generation Workflow\n\n\
  Follow these steps in order for every landing page request:\n\n1. **Gather inputs**\
  \ — collect product name, tagline, audience, pain point, key benefit, pricing tiers,\
  \ design style, and copy framework using the trigger format below. Ask only for\
  \ missing fields.\n2. **Analyze brand voice** (recommended) — if the user has existing\
  \ brand content (website copy, blog posts, marketing materials), run it through\
  \ `marketing-skill/skills/content-production/scripts/brand_voice_analyzer.py` to\
  \ get a voice profile (formality, tone, perspective). Use the profile to inform\
  \ design style and copy framework selection:\n   - formal + professional → **enterprise**\
  \ style, **AIDA** framework\n   - casual + friendly → **bold-startup** style, **BAB**\
  \ framework\n   - professional + authoritative → **dark-saas** style, **PAS** framework\n\
  \   - casual + conversational → **clean-minimal** style, **BAB** framework\n3. **Select\
  \ design style** — map the user's choice (or infer from brand voice analysis) to\
  \ one of the four Tailwind class sets in the Design Style Reference.\n4. **Apply\
  \ copy framework** — write all headline and body copy using the chosen framework\
  \ (PAS / AIDA / BAB) before generating components. Match the voice profile's formality\
  \ and tone throughout.\n5. **Generate sections in order** — Hero → Features → Pricing\
  \ → FAQ → Testimonials → CTA → Footer. Skip sections not relevant to the product.\n\
  6. **Validate against SEO checklist** — run through every item in the SEO Checklist\
  \ before outputting final code. Fix any gaps inline.\n7. **Output final components**\
  \ — deliver complete, copy-paste-ready TSX files with all Tailwind classes, SEO\
  \ meta, and structured data included.\n\n---\n\n## Triggering This Skill\n\n```\n\
  Product: [name]\nTagline: [one sentence value prop]\nTarget audience: [who they\
  \ are]\nKey pain point: [what problem you solve]\nKey benefit: [primary outcome]\n\
  Pricing tiers: [free/pro/enterprise or describe]\nDesign style: dark-saas | clean-minimal\
  \ | bold-startup | enterprise\nCopy framework: PAS | AIDA | BAB\n```\n\n---\n\n\
  ## Design Style Reference\n\n| Style | Background | Accent | Cards | CTA Button\
  \ |\n|---|---|---|---|---|\n| **Dark SaaS** | `bg-gray-950 text-white` | `violet-500/400`\
  \ | `bg-gray-900 border border-gray-800` | `bg-violet-600 hover:bg-violet-500` |\n\
  | **Clean Minimal** | `bg-white text-gray-900` | `blue-600` | `bg-gray-50 border\
  \ border-gray-200 rounded-2xl` | `bg-blue-600 hover:bg-blue-700` |\n| **Bold Startup**\
  \ | `bg-white text-gray-900` | `orange-500` | `shadow-xl rounded-3xl` | `bg-orange-500\
  \ hover:bg-orange-600 text-white` |\n| **Enterprise** | `bg-slate-50 text-slate-900`\
  \ | `slate-700` | `bg-white border border-slate-200 shadow-sm` | `bg-slate-900 hover:bg-slate-800\
  \ text-white` |\n\n> **Bold Startup** headings: add `font-black tracking-tight`\
  \ to all `<h1>`/`<h2>` elements.\n\n---\n\n## Copy Frameworks\n\n**PAS (Problem\
  \ → Agitate → Solution)**\n- H1: Painful state they're in\n- Sub: What happens if\
  \ they don't fix it\n- CTA: What you offer\n- *Example — H1:* \"Your team wastes\
  \ 3 hours a day on manual reporting\" / *Sub:* \"Every hour spent on spreadsheets\
  \ is an hour not closing deals. Your competitors are already automated.\" / *CTA:*\
  \ \"Automate your reports in 10 minutes →\"\n\n**AIDA (Attention → Interest → Desire\
  \ → Action)**\n- H1: Bold attention-grabbing statement → Sub: Interesting fact or\
  \ benefit → Features: Desire-building proof points → CTA: Clear action\n\n**BAB\
  \ (Before → After → Bridge)**\n- H1: \"[Before state] → [After state]\" → Sub: \"\
  Here's how [product] bridges the gap\" → Features: How it works (the bridge)\n\n\
  ---\n\n## Representative Component: Hero (Centered Gradient — Dark SaaS)\n\nUse\
  \ this as the structural template for all hero variants. Swap layout classes, gradient\
  \ direction, and image placement for split, video-bg, and minimal variants.\n\n\
  ```tsx\nexport function HeroCentered() {\n  return (\n    <section className=\"\
  relative flex min-h-screen flex-col items-center justify-center overflow-hidden\
  \ bg-gray-950 px-4 text-center\">\n      <div className=\"absolute inset-0 bg-gradient-to-b\
  \ from-violet-900/20 to-transparent\" />\n      <div className=\"pointer-events-none\
  \ absolute -top-40 left-1/2 h-[600px] w-[600px] -translate-x-1/2 rounded-full bg-violet-600/20\
  \ blur-3xl\" />\n      <div className=\"relative z-10 max-w-4xl\">\n        <div\
  \ className=\"mb-6 inline-flex items-center gap-2 rounded-full border border-violet-500/30\
  \ bg-violet-500/10 px-4 py-1.5 text-sm text-violet-300\">\n          <span className=\"\
  h-1.5 w-1.5 rounded-full bg-violet-400\" />\n          Now in public beta\n    \
  \    </div>\n        <h1 className=\"mb-6 text-5xl font-bold tracking-tight text-white\
  \ md:text-7xl\">\n          Ship faster.<br />\n          <span className=\"bg-gradient-to-r\
  \ from-violet-400 to-pink-400 bg-clip-text text-transparent\">\n            Break\
  \ less.\n          </span>\n        </h1>\n        <p className=\"mx-auto mb-10\
  \ max-w-2xl text-xl text-gray-400\">\n          The deployment platform that catches\
  \ errors before your users do.\n          Zero config. Instant rollbacks. Real-time\
  \ monitoring.\n        </p>\n        <div className=\"flex flex-col items-center\
  \ gap-4 sm:flex-row sm:justify-center\">\n          <Button size=\"lg\" className=\"\
  bg-violet-600 text-white hover:bg-violet-500 px-8\">\n            Start free trial\n\
  \          </Button>\n          <Button size=\"lg\" variant=\"outline\" className=\"\
  border-gray-700 text-gray-300\">\n            See how it works →\n          </Button>\n\
  \        </div>\n        <p className=\"mt-4 text-sm text-gray-500\">No credit card\
  \ required · 14-day free trial</p>\n      </div>\n    </section>\n  )\n}\n```\n\n\
  ---\n\n## Other Section Patterns\n\n### Feature Section (Alternating)\n\nMap over\
  \ a `features` array with `{ title, description, image, badge }`. Toggle layout\
  \ direction with `i % 2 === 1 ? \"lg:flex-row-reverse\" : \"\"`. Use `<Image>` with\
  \ explicit `width`/`height` and `rounded-2xl shadow-xl`. Wrap in `<section className=\"\
  py-24\">` with `max-w-6xl` container.\n\n### Pricing Table\n\nMap over a `plans`\
  \ array with `{ name, price, description, features[], cta, highlighted }`. Highlighted\
  \ plan gets `border-2 border-violet-500 bg-violet-950/50 ring-4 ring-violet-500/20`;\
  \ others get `border border-gray-800 bg-gray-900`. Render `null` price as \"Custom\"\
  . Use `<Check>` icon per feature row. Layout: `grid gap-8 lg:grid-cols-3`.\n\n###\
  \ FAQ with Schema Markup\n\nInject `FAQPage` JSON-LD via `<script type=\"application/ld+json\"\
  \ dangerouslySetInnerHTML={{ __html: JSON.stringify(schema) }} />` inside the section.\
  \ Map FAQs with `{ q, a }` into shadcn `<Accordion>` with `type=\"single\" collapsible`.\
  \ Container: `max-w-3xl`.\n\n### Testimonials, CTA, Footer\n\n- **Testimonials:**\
  \ Grid (`grid-cols-1 md:grid-cols-3`) or single-quote hero block with avatar, name,\
  \ role, and quote text.\n- **CTA Banner:** Full-width section with headline, subhead,\
  \ and two buttons (primary + ghost). Add trust signals (money-back guarantee, logo\
  \ strip) immediately below.\n- **Footer:** Logo + nav columns + social links + legal.\
  \ Use `border-t border-gray-800` separator.\n\n---\n\n## SEO Checklist\n\n- [ ]\
  \ `<title>` tag: primary keyword + brand (50–60 chars)\n- [ ] Meta description:\
  \ benefit + CTA (150–160 chars)\n- [ ] OG image: 1200×630px with product name and\
  \ tagline\n- [ ] H1: one per page, includes primary keyword\n- [ ] Structured data:\
  \ FAQPage, Product, or Organization schema\n- [ ] Canonical URL set\n- [ ] Image\
  \ alt text on all `<Image>` components\n- [ ] robots.txt and sitemap.xml configured\n\
  - [ ] Core Web Vitals: LCP < 1s, CLS < 0.1\n- [ ] Mobile viewport meta tag present\n\
  - [ ] Internal linking to pricing and docs\n\n> **Validation step:** Before outputting\
  \ final code, verify every checklist item above is satisfied. Fix any gaps inline\
  \ — do not skip items.\n\n---\n\n## Performance Targets\n\n| Metric | Target | Technique\
  \ |\n|---|---|---|\n| LCP | < 1s | Preload hero image, use `priority` on Next/Image\
  \ |\n| CLS | < 0.1 | Set explicit width/height on all images |\n| FID/INP | < 100ms\
  \ | Defer non-critical JS, use `loading=\"lazy\"` |\n| TTFB | < 200ms | Use ISR\
  \ or static generation for landing pages |\n| Bundle | < 100KB JS | Audit with `@next/bundle-analyzer`\
  \ |\n\n---\n\n## Common Pitfalls\n\n- Hero image not preloaded — add `priority`\
  \ prop to first `<Image>`\n- Missing mobile breakpoints — always design mobile-first\
  \ with `sm:` prefixes\n- CTA copy too vague — \"Get started\" beats \"Learn more\"\
  ; \"Start free trial\" beats \"Sign up\"\n- Pricing page missing trust signals —\
  \ add money-back guarantee and testimonials near CTA\n- No above-the-fold CTA on\
  \ mobile — ensure button is visible without scrolling on 375px viewport\n\n---\n\
  \n## Related Skills\n\n- **Brand Voice Analyzer** (`marketing-skill/skills/content-production/scripts/brand_voice_analyzer.py`)\
  \ — Run before generation to establish voice profile and ensure copy consistency\n\
  - **UI Design System** (`product-team/ui-design-system/`) — Generate design tokens\
  \ from brand color before building the page\n- **Competitive Teardown** (`product-team/competitive-teardown/`)\
  \ — Competitive positioning informs landing page messaging and differentiation"
