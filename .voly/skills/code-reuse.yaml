description: >-
  Prefer reusing modules from similar open-source GitHub repositories via the
  VOLY reuse CLI instead of rewriting from scratch. Use when the task involves
  scaffolding, integrating a known pattern (auth, CRUD, CLI, worker, scanner),
  vendoring a small utility, or the user mentions reuse / similar repos /
  open-source reference. Directs the agent to `voly reuse` artifacts — does not
  clone or copy itself.
