  Add BSP (Библиотека стандартных подсистем) subsystem modules to a 1C:Enterprise
  configuration following BSP architecture standards. Covers module naming, event
  subscriptions, role-based access, update handlers, and BSP compatibility.
  Use when the task mentions БСП, подсистема 1С, стандартные подсистемы, BSP subsystem,
  добавить подсистему, настроить БСП, обработчик обновления.
