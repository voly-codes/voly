content: |
  # BSP Module Integration Skill

  ## BSP naming conventions

  | Module type | Naming pattern | Example |
  |---|---|---|
  | Common (public) | `<ИмяПодсистемы>` | `РаботаСФайлами` |
  | Common (internal) | `<ИмяПодсистемы>Служебный` | `РаботаСФайламиСлужебный` |
  | Common (client) | `<ИмяПодсистемы>КлиентСервер` | `РаботаСФайламиКлиентСервер` |
  | Override module | `<ИмяПодсистемы>ПереопределяемыйМодуль` | - |

  ## Adding a new BSP subsystem

  1. **Create subsystem object** in configurator tree under `Подсистемы`
  2. **Create common modules** following naming table above
  3. **Register in BSP integration module** (`ИнтеграцияПодсистемБСП`):
     ```bsl
     // В ПриДобавленииПодсистем:
     Подсистема = Подсистемы.Добавить();
     Подсистема.Имя = "МояПодсистема";
     Подсистема.ВерсияБиблиотеки = "3.1.9";
     ```
  4. **Add update handler** if the subsystem stores settings:
     ```bsl
     // In update handler module, procedure OnAddUpdateHandlers:
     Обработчик = Обработчики.Добавить();
     Обработчик.Процедура = "МояПодсистема.ОбновитьДанные";
     Обработчик.Версия = "1.0.1.0";
     ```

  ## Event subscriptions

  Register event subscriptions in `ПодпискиНаСобытия`:
  ```
  Name: МояПодсистема_ПередЗаписьюДокумента
  Event: ПередЗаписью
  Source: <DocumentType>
  Handler: МояПодсистемаСлужебный.ПередЗаписьюДокумента
  ```

  ## Role-based access

  - Create roles in `Роли` section; do not hardcode role checks in module code
  - Use `ПравоДоступа("ИмяПрава", Метаданные.Документы.МойДокумент)` pattern
  - BSP provides `ПользователиСлужебный.РольДоступна()` for soft permission checks

  ## BSP compatibility check

  Always verify minimum BSP version in `ПриПроверкеВерсийБиблиотекиПодсистемой`:
  ```bsl
  Если НЕ ОбщегоНазначения.ВерсияРавнаИлиСтарше(ВерсияБСП, "3.1.0") Тогда
      ВызватьИсключение "Требуется БСП версии не ниже 3.1.0";
  КонецЕсли;
  ```
