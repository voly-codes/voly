id: saas-scaffolder
name: saas-scaffolder
description: Generates complete, production-ready SaaS project boilerplate including
  authentication, database schemas, billing integration, API routes, and a working
  dashboard using Next.js 14+ App Router, TypeScript, Tailwind CSS, shadcn/ui, Drizzle
  ORM, and Stripe. Use when the user wants to create a new SaaS app, start a subscription-based
  web project, scaffold a Next.js application, or mentions terms like starter template,
  boilerplate, new project, or wiring up auth and payments.
source: marketplace
status: active
version: 1.0.0
content: "# SaaS Scaffolder\n\n**Tier:** POWERFUL  \n**Category:** Product Team  \n\
  **Domain:** Full-Stack Development / Project Bootstrapping\n\n---\n\n## Input Format\n\
  \n```\nProduct: [name]\nDescription: [1-3 sentences]\nAuth: nextauth | clerk | supabase\n\
  Database: neondb | supabase | planetscale\nPayments: stripe | lemonsqueezy | none\n\
  Features: [comma-separated list]\n```\n\n---\n\n## File Tree Output\n\n```\nmy-saas/\n\
  в”њв”Ђв”Ђ app/\nв”‚   в”њв”Ђв”Ђ (auth)/\nв”‚   в”‚   в”њв”Ђв”Ђ login/page.tsx\nв”‚   в”‚   в”њв”Ђв”Ђ register/page.tsx\n\
  в”‚   в”‚   в””в”Ђв”Ђ layout.tsx\nв”‚   в”њв”Ђв”Ђ (dashboard)/\nв”‚   в”‚   в”њв”Ђв”Ђ dashboard/page.tsx\nв”‚\
  \   в”‚   в”њв”Ђв”Ђ settings/page.tsx\nв”‚   в”‚   в”њв”Ђв”Ђ billing/page.tsx\nв”‚   в”‚   в””в”Ђв”Ђ layout.tsx\n\
  в”‚   в”њв”Ђв”Ђ (marketing)/\nв”‚   в”‚   в”њв”Ђв”Ђ page.tsx\nв”‚   в”‚   в”њв”Ђв”Ђ pricing/page.tsx\nв”‚   в”‚\
  \   в””в”Ђв”Ђ layout.tsx\nв”‚   в”њв”Ђв”Ђ api/\nв”‚   в”‚   в”њв”Ђв”Ђ auth/[...nextauth]/route.ts\nв”‚   в”‚\
  \   в”њв”Ђв”Ђ webhooks/stripe/route.ts\nв”‚   в”‚   в”њв”Ђв”Ђ billing/checkout/route.ts\nв”‚   в”‚ \
  \  в””в”Ђв”Ђ billing/portal/route.ts\nв”‚   в””в”Ђв”Ђ layout.tsx\nв”њв”Ђв”Ђ components/\nв”‚   в”њв”Ђв”Ђ ui/\n\
  в”‚   в”њв”Ђв”Ђ auth/\nв”‚   в”‚   в”њв”Ђв”Ђ login-form.tsx\nв”‚   в”‚   в””в”Ђв”Ђ register-form.tsx\nв”‚   в”њв”Ђв”Ђ\
  \ dashboard/\nв”‚   в”‚   в”њв”Ђв”Ђ sidebar.tsx\nв”‚   в”‚   в”њв”Ђв”Ђ header.tsx\nв”‚   в”‚   в””в”Ђв”Ђ stats-card.tsx\n\
  в”‚   в”њв”Ђв”Ђ marketing/\nв”‚   в”‚   в”њв”Ђв”Ђ hero.tsx\nв”‚   в”‚   в”њв”Ђв”Ђ features.tsx\nв”‚   в”‚   в”њв”Ђв”Ђ\
  \ pricing.tsx\nв”‚   в”‚   в””в”Ђв”Ђ footer.tsx\nв”‚   в””в”Ђв”Ђ billing/\nв”‚       в”њв”Ђв”Ђ plan-card.tsx\n\
  в”‚       в””в”Ђв”Ђ usage-meter.tsx\nв”њв”Ђв”Ђ lib/\nв”‚   в”њв”Ђв”Ђ auth.ts\nв”‚   в”њв”Ђв”Ђ db.ts\nв”‚   в”њв”Ђв”Ђ stripe.ts\n\
  в”‚   в”њв”Ђв”Ђ validations.ts\nв”‚   в””в”Ђв”Ђ utils.ts\nв”њв”Ђв”Ђ db/\nв”‚   в”њв”Ђв”Ђ schema.ts\nв”‚   в””в”Ђв”Ђ migrations/\n\
  в”њв”Ђв”Ђ hooks/\nв”‚   в”њв”Ђв”Ђ use-subscription.ts\nв”‚   в””в”Ђв”Ђ use-user.ts\nв”њв”Ђв”Ђ types/index.ts\n\
  в”њв”Ђв”Ђ middleware.ts\nв”њв”Ђв”Ђ .env.example\nв”њв”Ђв”Ђ drizzle.config.ts\nв””в”Ђв”Ђ next.config.ts\n\
  ```\n\n---\n\n## Key Component Patterns\n\n### Auth Config (NextAuth)\n\n```typescript\n\
  // lib/auth.ts\nimport { NextAuthOptions } from \"next-auth\"\nimport GoogleProvider\
  \ from \"next-auth/providers/google\"\nimport { DrizzleAdapter } from \"@auth/drizzle-adapter\"\
  \nimport { db } from \"./db\"\n\nexport const authOptions: NextAuthOptions = {\n\
  \  adapter: DrizzleAdapter(db),\n  providers: [\n    GoogleProvider({\n      clientId:\
  \ process.env.GOOGLE_CLIENT_ID!,\n      clientSecret: process.env.GOOGLE_CLIENT_SECRET!,\n\
  \    }),\n  ],\n  callbacks: {\n    session: async ({ session, user }) => ({\n \
  \     ...session,\n      user: {\n        ...session.user,\n        id: user.id,\n\
  \        subscriptionStatus: user.subscriptionStatus,\n      },\n    }),\n  },\n\
  \  pages: { signIn: \"/login\" },\n}\n```\n\n### Database Schema (Drizzle + NeonDB)\n\
  \n```typescript\n// db/schema.ts\nimport { pgTable, text, timestamp, integer } from\
  \ \"drizzle-orm/pg-core\"\n\nexport const users = pgTable(\"users\", {\n  id: text(\"\
  id\").primaryKey().$defaultFn(() => crypto.randomUUID()),\n  name: text(\"name\"\
  ),\n  email: text(\"email\").notNull().unique(),\n  emailVerified: timestamp(\"\
  emailVerified\"),\n  image: text(\"image\"),\n  stripeCustomerId: text(\"stripe_customer_id\"\
  ).unique(),\n  stripeSubscriptionId: text(\"stripe_subscription_id\"),\n  stripePriceId:\
  \ text(\"stripe_price_id\"),\n  stripeCurrentPeriodEnd: timestamp(\"stripe_current_period_end\"\
  ),\n  createdAt: timestamp(\"created_at\").defaultNow().notNull(),\n})\n\nexport\
  \ const accounts = pgTable(\"accounts\", {\n  userId: text(\"user_id\").notNull().references(()\
  \ => users.id, { onDelete: \"cascade\" }),\n  type: text(\"type\").notNull(),\n\
  \  provider: text(\"provider\").notNull(),\n  providerAccountId: text(\"provider_account_id\"\
  ).notNull(),\n  refresh_token: text(\"refresh_token\"),\n  access_token: text(\"\
  access_token\"),\n  expires_at: integer(\"expires_at\"),\n})\n```\n\n### Stripe\
  \ Checkout Route\n\n```typescript\n// app/api/billing/checkout/route.ts\nimport\
  \ { NextResponse } from \"next/server\"\nimport { getServerSession } from \"next-auth\"\
  \nimport { authOptions } from \"@/lib/auth\"\nimport { stripe } from \"@/lib/stripe\"\
  \nimport { db } from \"@/lib/db\"\nimport { users } from \"@/db/schema\"\nimport\
  \ { eq } from \"drizzle-orm\"\n\nexport async function POST(req: Request) {\n  const\
  \ session = await getServerSession(authOptions)\n  if (!session?.user) return NextResponse.json({\
  \ error: \"Unauthorized\" }, { status: 401 })\n\n  const { priceId } = await req.json()\n\
  \  const [user] = await db.select().from(users).where(eq(users.id, session.user.id))\n\
  \n  let customerId = user.stripeCustomerId\n  if (!customerId) {\n    const customer\
  \ = await stripe.customers.create({ email: session.user.email! })\n    customerId\
  \ = customer.id\n    await db.update(users).set({ stripeCustomerId: customerId }).where(eq(users.id,\
  \ user.id))\n  }\n\n  const checkoutSession = await stripe.checkout.sessions.create({\n\
  \    customer: customerId,\n    mode: \"subscription\",\n    payment_method_types:\
  \ [\"card\"],\n    line_items: [{ price: priceId, quantity: 1 }],\n    success_url:\
  \ `${process.env.NEXT_PUBLIC_APP_URL}/dashboard?upgraded=true`,\n    cancel_url:\
  \ `${process.env.NEXT_PUBLIC_APP_URL}/pricing`,\n    subscription_data: { trial_period_days:\
  \ 14 },\n  })\n\n  return NextResponse.json({ url: checkoutSession.url })\n}\n```\n\
  \n### Middleware\n\n```typescript\n// middleware.ts\nimport { withAuth } from \"\
  next-auth/middleware\"\nimport { NextResponse } from \"next/server\"\n\nexport default\
  \ withAuth(\n  function middleware(req) {\n    const token = req.nextauth.token\n\
  \    if (req.nextUrl.pathname.startsWith(\"/dashboard\") && !token) {\n      return\
  \ NextResponse.redirect(new URL(\"/login\", req.url))\n    }\n  },\n  { callbacks:\
  \ { authorized: ({ token }) => !!token } }\n)\n\nexport const config = {\n  matcher:\
  \ [\"/dashboard/:path*\", \"/settings/:path*\", \"/billing/:path*\"],\n}\n```\n\n\
  ### Environment Variables Template\n\n```bash\n# .env.example\nNEXT_PUBLIC_APP_URL=http://localhost:3000\n\
  DATABASE_URL=postgresql://user:pass@ep-xxx.us-east-1.aws.neon.tech/neondb?sslmode=require\n\
  NEXTAUTH_SECRET=generate-with-openssl-rand-base64-32\nNEXTAUTH_URL=http://localhost:3000\n\
  GOOGLE_CLIENT_ID=\nGOOGLE_CLIENT_SECRET=\nSTRIPE_SECRET_KEY=sk_test_...\nSTRIPE_WEBHOOK_SECRET=whsec_...\n\
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_...\nSTRIPE_PRO_PRICE_ID=price_...\n\
  ```\n\n---\n\n## Scaffold Checklist\n\nThe following phases must be completed in\
  \ order. **Validate at the end of each phase before proceeding.**\n\n### Phase 1\
  \ вЂ” Foundation\n- [ ] 1. Next.js initialized with TypeScript and App Router\n- [\
  \ ] 2. Tailwind CSS configured with custom theme tokens\n- [ ] 3. shadcn/ui installed\
  \ and configured\n- [ ] 4. ESLint + Prettier configured\n- [ ] 5. `.env.example`\
  \ created with all required variables\n\nвњ… **Validate:** Run `npm run build` вЂ” no\
  \ TypeScript or lint errors should appear.  \n\U0001F527 **If build fails:** Check\
  \ `tsconfig.json` paths and that all shadcn/ui peer dependencies are installed.\n\
  \n### Phase 2 вЂ” Database\n- [ ] 6. Drizzle ORM installed and configured\n- [ ] 7.\
  \ Schema written (users, accounts, sessions, verification_tokens)\n- [ ] 8. Initial\
  \ migration generated and applied\n- [ ] 9. DB client singleton exported from `lib/db.ts`\n\
  - [ ] 10. DB connection tested in local environment\n\nвњ… **Validate:** Run a simple\
  \ `db.select().from(users)` in a test script вЂ” it should return an empty array without\
  \ throwing.  \n\U0001F527 **If DB connection fails:** Verify `DATABASE_URL` format\
  \ includes `?sslmode=require` for NeonDB/Supabase. Check that the migration has\
  \ been applied with `drizzle-kit push` (dev) or `drizzle-kit migrate` (prod).\n\n\
  ### Phase 3 вЂ” Authentication\n- [ ] 11. Auth provider installed (NextAuth / Clerk\
  \ / Supabase)\n- [ ] 12. OAuth provider configured (Google / GitHub)\n- [ ] 13.\
  \ Auth API route created\n- [ ] 14. Session callback adds user ID and subscription\
  \ status\n- [ ] 15. Middleware protects dashboard routes\n- [ ] 16. Login and register\
  \ pages built with error states\n\nвњ… **Validate:** Sign in via OAuth, confirm session\
  \ user has `id` and `subscriptionStatus`. Attempt to access `/dashboard` without\
  \ a session вЂ” you should be redirected to `/login`.  \n\U0001F527 **If sign-out\
  \ loops occur in production:** Ensure `NEXTAUTH_SECRET` is set and consistent across\
  \ deployments. Add `declare module \"next-auth\"` to extend session types if TypeScript\
  \ errors appear.\n\n### Phase 4 вЂ” Payments\n- [ ] 17. Stripe client initialized\
  \ with TypeScript types\n- [ ] 18. Checkout session route created\n- [ ] 19. Customer\
  \ portal route created\n- [ ] 20. Stripe webhook handler with signature verification\n\
  - [ ] 21. Webhook updates user subscription status in DB idempotently\n\nвњ… **Validate:**\
  \ Complete a Stripe test checkout using a `4242 4242 4242 4242` card. Confirm `stripeSubscriptionId`\
  \ is written to the DB. Replay the `checkout.session.completed` webhook event and\
  \ confirm idempotency (no duplicate DB writes).  \n\U0001F527 **If webhook signature\
  \ fails:** Use `stripe listen --forward-to localhost:3000/api/webhooks/stripe` locally\
  \ вЂ” never hardcode the raw webhook secret. Verify `STRIPE_WEBHOOK_SECRET` matches\
  \ the listener output.\n\n### Phase 5 вЂ” UI\n- [ ] 22. Landing page with hero, features,\
  \ pricing sections\n- [ ] 23. Dashboard layout with sidebar and responsive header\n\
  - [ ] 24. Billing page showing current plan and upgrade options\n- [ ] 25. Settings\
  \ page with profile update form and success states\n\nвњ… **Validate:** Run `npm run\
  \ build` for a final production build check. Navigate all routes manually and confirm\
  \ no broken layouts, missing session data, or hydration errors.\n\n---\n\n## Reference\
  \ Files\n\nFor additional guidance, generate the following companion reference files\
  \ alongside the scaffold:\n\n- **`CUSTOMIZATION.md`** вЂ” Auth providers, database\
  \ options, ORM alternatives, payment providers, UI themes, and billing models (per-seat,\
  \ flat-rate, usage-based).\n- **`PITFALLS.md`** вЂ” Common failure modes: missing\
  \ `NEXTAUTH_SECRET`, webhook secret mismatches, Edge runtime conflicts with Drizzle,\
  \ unextended session types, and migration strategy differences between dev and prod.\n\
  - **`BEST_PRACTICES.md`** вЂ” Stripe singleton pattern, server actions for form mutations,\
  \ idempotent webhook handlers, `Suspense` boundaries for async dashboard data, server-side\
  \ feature gating via `stripeCurrentPeriodEnd`, and rate limiting on auth routes\
  \ with Upstash Redis + `@upstash/ratelimit`."
