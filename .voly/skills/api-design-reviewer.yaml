id: api-design-reviewer
name: api-design-reviewer
description: Comprehensive REST API design review with automated linting, breaking-change
  detection, and design scorecards. Catches inconsistent conventions, missing versioning,
  and design smells before APIs ship. Use when reviewing a PR that adds or changes
  API endpoints, auditing an existing API for v2 migration, or establishing API standards
  for a team.
source: marketplace
status: active
version: 1.0.0
content: "# API Design Reviewer\n\n**Tier:** POWERFUL  \n**Category:** Engineering\
  \ / Architecture  \n**Maintainer:** Claude Skills Team  \n\n## Overview\n\nThe API\
  \ Design Reviewer skill provides comprehensive analysis and review of API designs,\
  \ focusing on REST conventions, best practices, and industry standards. This skill\
  \ helps engineering teams build consistent, maintainable, and well-designed APIs\
  \ through automated linting, breaking change detection, and design scorecards.\n\
  \n## Quick Start — run the tools first\n\n```bash\n# 1. Lint an OpenAPI/Swagger\
  \ spec for convention violations\npython3 scripts/api_linter.py openapi.json --format\
  \ json -o lint.json\n\n# 2. Detect breaking changes between two spec versions (gate:\
  \ exits non-zero with --exit-on-breaking)\npython3 scripts/breaking_change_detector.py\
  \ openapi-v1.json openapi-v2.json --format json --exit-on-breaking -o breaking.json\n\
  \n# 3. Score overall design quality (gate: --min-grade fails below threshold)\n\
  python3 scripts/api_scorecard.py openapi.json --format json --min-grade B -o scorecard.json\n\
  ```\n\nReview flow: run all three, report linter findings + breaking changes + grade\
  \ to the user, fix, then re-run until the linter is clean, `--exit-on-breaking`\
  \ passes (or breaking changes are version-bumped), and the scorecard meets the agreed\
  \ `--min-grade`. Never sign off an API review on prose alone — attach the tool outputs.\n\
  \n## Core Capabilities\n\n### 1. API Linting and Convention Analysis\n- **Resource\
  \ Naming Conventions**: Enforces kebab-case for resources, camelCase for fields\n\
  - **HTTP Method Usage**: Validates proper use of GET, POST, PUT, PATCH, DELETE\n\
  - **URL Structure**: Analyzes endpoint patterns for consistency and RESTful design\n\
  - **Status Code Compliance**: Ensures appropriate HTTP status codes are used\n-\
  \ **Error Response Formats**: Validates consistent error response structures\n-\
  \ **Documentation Coverage**: Checks for missing descriptions and documentation\
  \ gaps\n\n### 2. Breaking Change Detection\n- **Endpoint Removal**: Detects removed\
  \ or deprecated endpoints\n- **Response Shape Changes**: Identifies modifications\
  \ to response structures\n- **Field Removal**: Tracks removed or renamed fields\
  \ in API responses\n- **Type Changes**: Catches field type modifications that could\
  \ break clients\n- **Required Field Additions**: Flags new required fields that\
  \ could break existing integrations\n- **Status Code Changes**: Detects changes\
  \ to expected status codes\n\n### 3. API Design Scoring and Assessment\n- **Consistency\
  \ Analysis** (30%): Evaluates naming conventions, response patterns, and structural\
  \ consistency\n- **Documentation Quality** (20%): Assesses completeness and clarity\
  \ of API documentation\n- **Security Implementation** (20%): Reviews authentication,\
  \ authorization, and security headers\n- **Usability Design** (15%): Analyzes ease\
  \ of use, discoverability, and developer experience\n- **Performance Patterns**\
  \ (15%): Evaluates caching, pagination, and efficiency patterns\n\n## REST Design\
  \ Principles\n\n### Resource Naming Conventions\n```\n✅ Good Examples:\n- /api/v1/users\n\
  - /api/v1/user-profiles\n- /api/v1/orders/123/line-items\n\n❌ Bad Examples:\n- /api/v1/getUsers\n\
  - /api/v1/user_profiles\n- /api/v1/orders/123/lineItems\n```\n\n### HTTP Method\
  \ Usage\n- **GET**: Retrieve resources (safe, idempotent)\n- **POST**: Create new\
  \ resources (not idempotent)\n- **PUT**: Replace entire resources (idempotent)\n\
  - **PATCH**: Partial resource updates (not necessarily idempotent)\n- **DELETE**:\
  \ Remove resources (idempotent)\n\n### URL Structure Best Practices\n```\nCollection\
  \ Resources: /api/v1/users\nIndividual Resources: /api/v1/users/123\nNested Resources:\
  \ /api/v1/users/123/orders\nActions: /api/v1/users/123/activate (POST)\nFiltering:\
  \ /api/v1/users?status=active&role=admin\n```\n\n## Versioning Strategies\n\n###\
  \ 1. URL Versioning (Recommended)\n```\n/api/v1/users\n/api/v2/users\n```\n**Pros**:\
  \ Clear, explicit, easy to route  \n**Cons**: URL proliferation, caching complexity\n\
  \n### 2. Header Versioning\n```\nGET /api/users\nAccept: application/vnd.api+json;version=1\n\
  ```\n**Pros**: Clean URLs, content negotiation  \n**Cons**: Less visible, harder\
  \ to test manually\n\n### 3. Media Type Versioning\n```\nGET /api/users\nAccept:\
  \ application/vnd.myapi.v1+json\n```\n**Pros**: RESTful, supports multiple representations\
  \  \n**Cons**: Complex, harder to implement\n\n### 4. Query Parameter Versioning\n\
  ```\n/api/users?version=1\n```\n**Pros**: Simple to implement  \n**Cons**: Not RESTful,\
  \ can be ignored\n\n## Pagination Patterns\n\n### Offset-Based Pagination\n```json\n\
  {\n  \"data\": [...],\n  \"pagination\": {\n    \"offset\": 20,\n    \"limit\":\
  \ 10,\n    \"total\": 150,\n    \"hasMore\": true\n  }\n}\n```\n\n### Cursor-Based\
  \ Pagination\n```json\n{\n  \"data\": [...],\n  \"pagination\": {\n    \"nextCursor\"\
  : \"eyJpZCI6MTIzfQ==\",\n    \"hasMore\": true\n  }\n}\n```\n\n### Page-Based Pagination\n\
  ```json\n{\n  \"data\": [...],\n  \"pagination\": {\n    \"page\": 3,\n    \"pageSize\"\
  : 10,\n    \"totalPages\": 15,\n    \"totalItems\": 150\n  }\n}\n```\n\n## Error\
  \ Response Formats\n\n### Standard Error Structure\n```json\n{\n  \"error\": {\n\
  \    \"code\": \"VALIDATION_ERROR\",\n    \"message\": \"The request contains invalid\
  \ parameters\",\n    \"details\": [\n      {\n        \"field\": \"email\",\n  \
  \      \"code\": \"INVALID_FORMAT\",\n        \"message\": \"Email address is not\
  \ valid\"\n      }\n    ],\n    \"requestId\": \"req-123456\",\n    \"timestamp\"\
  : \"2026-02-16T13:00:00Z\"\n  }\n}\n```\n\n### HTTP Status Code Usage\n- **400 Bad\
  \ Request**: Invalid request syntax or parameters\n- **401 Unauthorized**: Authentication\
  \ required\n- **403 Forbidden**: Access denied (authenticated but not authorized)\n\
  - **404 Not Found**: Resource not found\n- **409 Conflict**: Resource conflict (duplicate,\
  \ version mismatch)\n- **422 Unprocessable Entity**: Valid syntax but semantic errors\n\
  - **429 Too Many Requests**: Rate limit exceeded\n- **500 Internal Server Error**:\
  \ Unexpected server error\n\n## Authentication and Authorization Patterns\n\n###\
  \ Bearer Token Authentication\n```\nAuthorization: Bearer <token>\n```\n\n### API\
  \ Key Authentication\n```\nX-API-Key: <api-key>\nAuthorization: Api-Key <api-key>\n\
  ```\n\n### OAuth 2.0 Flow\n```\nAuthorization: Bearer <oauth-access-token>\n```\n\
  \n### Role-Based Access Control (RBAC)\n```json\n{\n  \"user\": {\n    \"id\": \"\
  123\",\n    \"roles\": [\"admin\", \"editor\"],\n    \"permissions\": [\"read:users\"\
  , \"write:orders\"]\n  }\n}\n```\n\n## Rate Limiting Implementation\n\n### Headers\n\
  ```\nX-RateLimit-Limit: 1000\nX-RateLimit-Remaining: 999\nX-RateLimit-Reset: 1640995200\n\
  ```\n\n### Response on Limit Exceeded\n```json\n{\n  \"error\": {\n    \"code\"\
  : \"RATE_LIMIT_EXCEEDED\",\n    \"message\": \"Too many requests\",\n    \"retryAfter\"\
  : 3600\n  }\n}\n```\n\n## HATEOAS (Hypermedia as the Engine of Application State)\n\
  \n### Example Implementation\n```json\n{\n  \"id\": \"123\",\n  \"name\": \"John\
  \ Doe\",\n  \"email\": \"john@example.com\",\n  \"_links\": {\n    \"self\": { \"\
  href\": \"/api/v1/users/123\" },\n    \"orders\": { \"href\": \"/api/v1/users/123/orders\"\
  \ },\n    \"profile\": { \"href\": \"/api/v1/users/123/profile\" },\n    \"deactivate\"\
  : { \n      \"href\": \"/api/v1/users/123/deactivate\",\n      \"method\": \"POST\"\
  \n    }\n  }\n}\n```\n\n## Idempotency\n\n### Idempotent Methods\n- **GET**: Always\
  \ safe and idempotent\n- **PUT**: Should be idempotent (replace entire resource)\n\
  - **DELETE**: Should be idempotent (same result)\n- **PATCH**: May or may not be\
  \ idempotent\n\n### Idempotency Keys\n```\nPOST /api/v1/payments\nIdempotency-Key:\
  \ 123e4567-e89b-12d3-a456-426614174000\n```\n\n## Backward Compatibility Guidelines\n\
  \n### Safe Changes (Non-Breaking)\n- Adding optional fields to requests\n- Adding\
  \ fields to responses\n- Adding new endpoints\n- Making required fields optional\n\
  - Adding new enum values (with graceful handling)\n\n### Breaking Changes (Require\
  \ Version Bump)\n- Removing fields from responses\n- Making optional fields required\n\
  - Changing field types\n- Removing endpoints\n- Changing URL structures\n- Modifying\
  \ error response formats\n\n## OpenAPI/Swagger Validation\n\n### Required Components\n\
  - **API Information**: Title, description, version\n- **Server Information**: Base\
  \ URLs and descriptions\n- **Path Definitions**: All endpoints with methods\n- **Parameter\
  \ Definitions**: Query, path, header parameters\n- **Request/Response Schemas**:\
  \ Complete data models\n- **Security Definitions**: Authentication schemes\n- **Error\
  \ Responses**: Standard error formats\n\n### Best Practices\n- Use consistent naming\
  \ conventions\n- Provide detailed descriptions for all components\n- Include examples\
  \ for complex objects\n- Define reusable components and schemas\n- Validate against\
  \ OpenAPI specification\n\n## Performance Considerations\n\n### Caching Strategies\n\
  ```\nCache-Control: public, max-age=3600\nETag: \"123456789\"\nLast-Modified: Wed,\
  \ 21 Oct 2015 07:28:00 GMT\n```\n\n### Efficient Data Transfer\n- Use appropriate\
  \ HTTP methods\n- Implement field selection (`?fields=id,name,email`)\n- Support\
  \ compression (gzip)\n- Implement efficient pagination\n- Use ETags for conditional\
  \ requests\n\n### Resource Optimization\n- Avoid N+1 queries\n- Implement batch\
  \ operations\n- Use async processing for heavy operations\n- Support partial updates\
  \ (PATCH)\n\n## Security Best Practices\n\n### Input Validation\n- Validate all\
  \ input parameters\n- Sanitize user data\n- Use parameterized queries\n- Implement\
  \ request size limits\n\n### Authentication Security\n- Use HTTPS everywhere\n-\
  \ Implement secure token storage\n- Support token expiration and refresh\n- Use\
  \ strong authentication mechanisms\n\n### Authorization Controls\n- Implement principle\
  \ of least privilege\n- Use resource-based permissions\n- Support fine-grained access\
  \ control\n- Audit access patterns\n\n## Tools and Scripts\n\n### api_linter.py\n\
  Analyzes API specifications for compliance with REST conventions and best practices.\n\
  \n**Features:**\n- OpenAPI/Swagger spec validation\n- Naming convention checks\n\
  - HTTP method usage validation\n- Error format consistency\n- Documentation completeness\
  \ analysis\n\n### breaking_change_detector.py\nCompares API specification versions\
  \ to identify breaking changes.\n\n**Features:**\n- Endpoint comparison\n- Schema\
  \ change detection\n- Field removal/modification tracking\n- Migration guide generation\n\
  - Impact severity assessment\n\n### api_scorecard.py\nProvides comprehensive scoring\
  \ of API design quality.\n\n**Features:**\n- Multi-dimensional scoring\n- Detailed\
  \ improvement recommendations\n- Letter grade assessment (A-F)\n- Benchmark comparisons\n\
  - Progress tracking\n\n## Integration Examples\n\n### CI/CD Integration\n```yaml\n\
  - name: \"api-linting\"\n  run: python scripts/api_linter.py openapi.json\n\n- name:\
  \ \"breaking-change-detection\"\n  run: python scripts/breaking_change_detector.py\
  \ openapi-v1.json openapi-v2.json\n\n- name: \"api-scorecard\"\n  run: python scripts/api_scorecard.py\
  \ openapi.json\n```\n\n### Pre-commit Hooks\n```bash\n#!/bin/bash\npython engineering/skills/api-design-reviewer/scripts/api_linter.py\
  \ api/openapi.json\nif [ $? -ne 0 ]; then\n  echo \"API linting failed. Please fix\
  \ the issues before committing.\"\n  exit 1\nfi\n```\n\n## Best Practices Summary\n\
  \n1. **Consistency First**: Maintain consistent naming, response formats, and patterns\n\
  2. **Documentation**: Provide comprehensive, up-to-date API documentation\n3. **Versioning**:\
  \ Plan for evolution with clear versioning strategies\n4. **Error Handling**: Implement\
  \ consistent, informative error responses\n5. **Security**: Build security into\
  \ every layer of the API\n6. **Performance**: Design for scale and efficiency from\
  \ the start\n7. **Backward Compatibility**: Minimize breaking changes and provide\
  \ migration paths\n8. **Testing**: Implement comprehensive testing including contract\
  \ testing\n9. **Monitoring**: Add observability for API usage and performance\n\
  10. **Developer Experience**: Prioritize ease of use and clear documentation\n\n\
  ## Common Anti-Patterns to Avoid\n\n1. **Verb-based URLs**: Use nouns for resources,\
  \ not actions\n2. **Inconsistent Response Formats**: Maintain standard response\
  \ structures\n3. **Over-nesting**: Avoid deeply nested resource hierarchies\n4.\
  \ **Ignoring HTTP Status Codes**: Use appropriate status codes for different scenarios\n\
  5. **Poor Error Messages**: Provide actionable, specific error information\n6. **Missing\
  \ Pagination**: Always paginate list endpoints\n7. **No Versioning Strategy**: Plan\
  \ for API evolution from day one\n8. **Exposing Internal Structure**: Design APIs\
  \ for external consumption, not internal convenience\n9. **Missing Rate Limiting**:\
  \ Protect your API from abuse and overload\n10. **Inadequate Testing**: Test all\
  \ aspects including error cases and edge conditions\n\n\nRegular use of the linting,\
  \ breaking change detection, and scoring tools ensures continuous improvement and\
  \ helps maintain API quality throughout the development lifecycle."
