tasks:
- agent: cursor
  label: 'cursor: stickies backend — smarty-stickies module'
  task: "STEP 1/5 — Backend: новый модуль smarty-stickies.\n\nProject: {{SMARTY_PROJECT}}.\
    \ Pattern: copy structure from smarty-tracker/ (index.js, models/, routes/index.js,\
    \ docs/API.md).\n\nMOUNT: register in api-rest/routes/workspace.js like workspaceTracker\
    \ → require('../../smarty-stickies'). Routes under /ws/:_wsId/stickies/*.\n\n\
    MODEL sticky (Mongo, register in models/index.js):\n  _wsId, _ownerId (employee\
    \ _id), name (optional, max 100)\n  description (String, plain text or simple\
    \ HTML — store as string)\n  backgroundColor (String, hex or palette key e.g.\
    \ 'yellow'|'pink'|'blue')\n  sortOrder (Number, default auto-increment +10000\
    \ on create)\n  isDeleted (Boolean), _createdOn, _updatedOn\n  Index: { _wsId,\
    \ _ownerId, isDeleted, sortOrder }\n\nROUTES (EmployeeRequest auth, scope = current\
    \ employee only):\n  GET    /stickies           — list own stickies, ?query= search\
    \ in description/name\n  POST   /stickies           — create { description?, name?,\
    \ backgroundColor? }\n  GET    /stickies/:id       — get one (403 if not owner)\n\
    \  PATCH  /stickies/:id       — update fields + sortOrder (for DnD reorder)\n\
    \  DELETE /stickies/:id       — soft delete\n  POST   /stickies/reorder   — {\
    \ stickyId, targetStickyId, position: 'before'|'after' }\n\nDTO: return { _id,\
    \ name, description, backgroundColor, sortOrder, _createdOn, _updatedOn }.\nMigration\
    \ script optional (indexes only). Update smarty-stickies/docs/API.md.\nDo NOT\
    \ modify notes collection. Minimal working JS."
