# Combat mission: legacy-gap-audit
# Run: python3 -m voly.cli smarty combat run legacy-gap-audit --sequential

name: legacy-gap-audit
description: 'Аудит legacy smarty-crm-frontend vs smarty-crm-next: матрица модулей
  (реализован / частично / отсутствует). Только отчёт, без кода.'
tasks:
- agent: cursor
  label: 'cursor: inventory legacy modules'
  task: "STEP 1/3 — Inventory legacy frontend modules (read-only).\n\nLegacy source:\
    \ {{LEGACY_FRONTEND}}/src/\nRoutes: {{LEGACY_FRONTEND_ROUTES}}\nLegacy docs: {{LEGACY_FRONTEND_DOCS}}/\
    \ (ROUTING.md, PAGES.md, STATE.md)\n\nSCAN legacy codebase and build module inventory:\n\
    \  - Sections from routesData: contacts, projects/deals, assignments/tasks, dialogs/inbox,\
    \ requisitions, notes, goals, files, reports, settings, market, pbx, billing,\
    \ automations, extbot, consultant, tracker, etc.\n  - For each: route pattern,\
    \ main components path, key features\n  - Group by business domain (CRM, Helpdesk,\
    \ Comms, Admin, Integrations)\n\nWRITE docs/reports/legacy-gap-audit.md section\
    \ 1 «Legacy inventory».\nDO NOT edit production src/ in this step."
- agent: cursor
  label: 'cursor: map new frontend coverage'
  task: "STEP 2/3 — Map smarty-crm-next implementation status.\n\nNew app: {{SMARTY_PROJECT}}/src/pages/,\
    \ src/App.tsx routes\nStatus doc: {{SMARTY_REPORTS}}/CURRENT_STATUS.md\nContinue:\
    \ docs/reports/legacy-gap-audit.md\n\nFor EACH legacy module from step 1, classify:\n\
    \  ✅ done — feature parity acceptable for v1\n  \U0001F7E1 partial — page exists\
    \ but missing sub-features (list gaps)\n  ❌ missing — no route/page in smarty-crm-next\n\
    \  \U0001F6AB dropped — intentionally removed (e.g. daily tasks → tracker)\n\n\
    Cross-check App.tsx routes + Sidebar nav + hooks (real API, no mock).\nAppend\
    \ section 2 «Coverage matrix» as markdown table:\n  Module | Legacy route | New\
    \ route | Status | Notes\n\nDO NOT implement missing modules — audit only."
- agent: cursor
  label: 'cursor: prioritize missing modules report'
  task: "STEP 3/3 — Prioritized gap list + recommendations.\n\nReport: docs/reports/legacy-gap-audit.md\n\
    Project: {{SMARTY_PROJECT}}\n\nCOMPLETE the audit report with:\n  Section 3 —\
    \ Top 20 missing/partial modules ranked P0/P1/P2\n  Section 4 — Suggested VOLY\
    \ missions (name + 1-line scope)\n  Section 5 — Quick wins (small gaps, <1 day\
    \ each)\n\nUPDATE docs/reports/CURRENT_STATUS.md — add «Legacy migration gaps»\
    \ summary with link to legacy-gap-audit.md.\n\nCHECKLIST:\n✅ All major legacy\
    \ sections from routesData covered in matrix\n✅ Honest partial vs missing distinction\n\
    ✅ No code changes except docs/reports/*.md\n"
