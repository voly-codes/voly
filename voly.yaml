# VOLY Configuration
# =====================

default_model: kimi-k3
default_agent: kimi

models:
  claude-sonnet:
    provider: anthropic
    model: claude-sonnet-4-6
    api_key: "${ANTHROPIC_API_KEY}"
  claude-opus:
    provider: anthropic
    model: claude-opus-4-8
    api_key: "${ANTHROPIC_API_KEY}"
  kimi-k3:
    provider: opencode
    model: kimi-k3
    api_key: "${OPENCODE_API_KEY}"
  gpt-4o:
    provider: openai
    model: gpt-4o
    api_key: "${OPENAI_API_KEY}"
  gemini-pro:
    provider: google
    model: gemini-2.5-pro
    api_key: "${GOOGLE_API_KEY}"

agents:
  claude:
    description: "Claude Code — резервный агент разработки"
    model: claude-sonnet
  kimi:
    description: "Kimi K3 (OpenCode Go) — основной агент разработки"
    model: kimi-k3
  architect:
    description: "Агент архитектурного планирования (модель роутера переопределяется VOLY_ARCHITECT_MODEL)"
    model: kimi-k3
    tools: [github, gitlab, wiki]
  reviewer:
    description: "Агент код-ревью"
    model: gpt-4o
    tools: [github]
  bugfixer:
    description: "Агент исправления багов"
    model: claude-sonnet
    tools: [github, temporal]

rtk:
  enabled: true
  auto_install: true

headroom:
  enabled: true
  port: 8787
  savings_profile: agent-90
  memory_enabled: false

memory:
  enabled: true
  backend: hybrid
  remote_url: "${CF_WORKER_MEMORY_URL}"
  db_path: ".voly/memory.db"

a2a:
  enabled: true
  port: 9100
  federation_url: "${CF_WORKER_A2A_URL}"
  agent_discovery: true
  remote_agents: []
  local_agents: []
  # Per-role executor timeout (hybrid developer/tester via claude-code).
  # Greenfield projects need more than the old 120s default.
  task_timeout_seconds: 900
  # Wave parallelism: independent roles (e.g. tester+devops after developer)
  # issue their chat calls concurrently; executor roles stay serial.
  parallel_waves: true
  max_parallel_roles: 3
  # LLM lead call only for non-standard decompositions (unknown roles / >5
  # sub-tasks); standard role sets use the deterministic role→tier map and
  # skip the premium lead chat entirely. llm — always call; deterministic — never.
  lead_mode: auto
  # Default file-writing executor for hybrid roles. Overrides the built-in
  # per-role map (developer→cursor, bugfixer→deepseek) when set to anything
  # other than "claude-code". Per-role env VOLY_A2A_EXECUTOR_<ROLE> still wins.
  executor_default: claude-code
  # Architect plan chat budget (avoid truncating designs at 2048).
  architect_max_tokens: 4096
  # Per-role model tier overrides (premium | standard | cheap).
  # architect defaults to standard — plan-only, not tied to a single provider.
  # Set architect: premium to restore Opus-level planning when budget allows.
  role_tiers:
    architect: standard

# Plan gates (Rung B): mirror multi-agent roles as Plan steps with verification.
# shadow — run verifiers (git diff, file line limits, tester command) and log;
# do not hard-block dependents on verify fail. active — hard gate.
plan:
  enabled: true
  mode: shadow
  # pytest + pip install -e . on greenfield Python projects can exceed 60s.
  # ruff check, coverage runs, and npm install all add to the budget.
  command_timeout_seconds: 120
  # Executor roles must leave a git diff — pairs with the hard rule in
  # run_local (executor success with zero files_touched → role failed).
  executor_require_git_diff: true
  # Extra basenames / path prefixes to skip in file_line_limit checks.
  # These are added on top of the built-in exclusions (package-lock.json,
  # yarn.lock, poetry.lock, Cargo.lock, go.sum, node_modules/, etc.).
  file_line_limit_exclude_patterns: []

agui:
  enabled: true
  port: 9101
  remote_url: "${CF_WORKER_AGUI_URL}"
  streaming: true
  session_timeout_seconds: 3600

spend:
  enabled: true
  remote_url: "${CF_WORKER_SPEND_URL}"
  daily_budget_usd: 20.0

mcp:
  servers: []
  tools_allowlist: []

workflow:
  enabled: true
  remote_url: "${CF_WORKER_WORKFLOW_URL}"
  max_retries: 3
  retry_delay_seconds: 5.0
  timeout_seconds: 300.0

registry:
  enabled: true
  agents_path: ".voly/agents"
  skills_path: ".voly/skills"

scanner:
  enabled: true
  auto_scan: true
  scan_depth: 3

reuse:
  enabled: true
  cache_dir: ".voly/reuse/cache"
  reports_dir: ".voly/reuse/reports"
  max_repos: 5
  min_stars: 20
  allowed_licenses: [mit, apache-2.0, bsd-2-clause, bsd-3-clause, isc, 0bsd, unlicense]
  deny_licenses: [gpl-2.0, gpl-3.0, agpl-3.0]
  pack_max_chars: 80000
  apply_dest: "vendor/reuse"
  auto: true
  auto_max_repos: 3
  auto_max_age_seconds: 604800

ai_gateway:
  enabled: true
  provider: cloudflare
  account_id: "${CLOUDFLARE_ACCOUNT_ID}"
  gateway_id: "${CLOUDFLARE_AI_GATEWAY_ID}"
  api_token: "${CLOUDFLARE_API_TOKEN}"
  caching:
    enabled: true
    ttl_seconds: 3600
  rate_limits:
    enabled: true
    requests_per_minute: 60
  spend_limits:
    enabled: true
    daily_budget_usd: 20
    per_agent_budget: {}
  # Stall / legacy single-timeout (used when total unset on bare gateway).
  request_timeout_seconds: 15
  # Full response budget for live but slow models (CF/deepseek generation).
  request_total_timeout_seconds: 60
  fallback:
    enabled: true
    chain:
      - provider: deepseek
        model: deepseek-chat
    retries: 3
  dlp:
    enabled: false
    block_secrets: true
    block_pii: true

cost_policy:
  enabled: true
  max_task_cost_usd: 5.00
  stop_on_budget_exceeded: true
  prefer_cheaper_model_for:
    - docs
    - tests
    - summarization
  cheaper_model: deepseek-v4-flash

telemetry:
  enabled: true
  events_dir: ".voly/events"
  pipeline_url: "${CF_PIPELINE_TELEMETRY_ENDPOINT}"
  pipeline_enabled: true
  pipeline_timeout_seconds: 5
  r2_enabled: true

# DSPy optimizer layer (optional, requires: pip install voly[dspy])
# mode: off | shadow | active
# shadow — runs in parallel, logs diff to telemetry, does NOT affect responses
# active — replaces AIGateway.chat() for agents listed in `agents`
capability:
  enabled: true
  worker_url: "${VOLY_CAPABILITY_WORKER_URL}"

dspy:
  enabled: false
  mode: shadow
  optimizer: bootstrap_fewshot
  min_examples: 20
  compile_budget: small
  routing_mode: shadow
  agents:
    - reviewer
    - documenter
    - architect
  active_tag: production
  shadow_tag: candidate
  program_overrides: {}
